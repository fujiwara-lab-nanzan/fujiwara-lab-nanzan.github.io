<!-- 
===================================================================
藤原研究室 ホームページ - ホーム（index.html）
===================================================================
このファイルは「ホーム（トップページ）」のレイアウトと内容を定義しています。

【編集可能な主な箇所】
- ヒーローセクション（ファーストビュー）のタイトル、説明文（59行目付近）
- ヒーロー画像スライドショーの画像パス（70行目付近）
- 紹介動画のYouTube埋め込みリンク（120行目付近）

【注意点】
- トピックス（お知らせ）は「news-data.js」で一元管理されています。このファイルを直接編集する必要はありません。
- ヘッダー・フッター（メニューなど）は全ページ共通ですので、変更時は他ページも同様に修正してください。
===================================================================
-->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藤原研究室 | 南山大学 — 超音波工学・超音波計測・超音波信号処理</title>
    <meta name="description" content="南山大学 藤原研究室。超音波工学・超音波計測・超音波信号処理を専門とし、非接触センシング技術の研究開発を行っています。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- 
    【共通ヘッダー】
    メニュー項目を増やしたり変更したりする場合は、このブロックおよび下方の
    モバイルメニュー（mobile-menu）、そして他ページ（news.html等）のヘッダーも同様に修正してください。
    -->
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">南山大学 藤原研究室</a>
            <nav class="main-nav">
                <a href="index.html">ホーム</a>
                <a href="news.html">トピックス</a>
                <!-- <a href="research.html">研究内容</a> -->
                <a href="members.html">メンバー</a>
                <a href="achievements.html">研究業績</a>
                <a href="gallery.html">ギャラリー</a>
                <a href="equipments.html">研究設備</a>
                <a href="contact.html">アクセス</a>
                <a href="links.html">リンク</a>
            </nav>
            <button id="mobile-menu-button" class="mobile-menu-button" aria-label="メニュー">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="index.html">ホーム</a>
            <a href="news.html">トピックス</a>
            <!-- <a href="research.html">研究内容</a> -->
            <a href="members.html">メンバー</a>
            <a href="achievements.html">研究業績</a>
            <a href="gallery.html">ギャラリー</a>
            <a href="equipments.html">研究設備</a>
            <a href="contact.html">アクセス</a>
            <a href="links.html">リンク</a>
        </div>
    </header>

    <main>
        <!-- ===== ヒーローセクション ===== -->
        <section class="hero-gallery-section">
            <canvas id="wave-canvas"></canvas>
            <div class="gallery-wrapper">
                <div class="hero-overlay">
                    <div>
                        <p class="hero-label">Nanzan University</p>
                        <h1 class="hero-title">藤原研究室</h1>
                        <p class="hero-subtitle">Fujiwara Laboratory</p>
                        <p class="hero-description">ー「非接触な感覚」で情報システムとシームレスにつながるー</p>
                    </div>
                </div>
                <!-- 
                【ヒーロー画像スライドショーの画像変更箇所】
                表示したい画像のパス（img/〜）をsrc属性に指定してください。
                画像を増やす、または減らす場合は <h2> 等のタグではなく、以下の <div class="gallery-item"> ブロックを追加・削除してください。
                -->
                <div id="gallery-container" class="gallery-container">
                    <div class="gallery-item">
                        <img src="img/home/241028_0163.jpg" alt="藤原研究室の様子">
                    </div>
                    <div class="gallery-item">
                        <img src="img/gallery/M1members.jpg" alt="M1メンバー">
                    </div>
                    <div class="gallery-item">
                        <img src="img/gallery/20251219.jpg" alt="研究室集合写真">
                    </div>
                    <div class="gallery-item">
                        <img src="img/news/IEEETOWERS感謝状.jpg" alt="IEEE TOWERS感謝状">
                    </div>
                </div>
                <button id="prev-btn" class="gallery-btn prev" aria-label="前の画像">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
                <button id="next-btn" class="gallery-btn next" aria-label="次の画像">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>

        </section>

        <!-- ===== 波形ディバイダー ===== -->
        <div class="wave-divider">
            <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
                <path d="M0,30 C200,60 400,0 600,30 C800,60 1000,0 1200,30 L1200,60 L0,60 Z"
                      fill="var(--light-bg)" />
                <path d="M0,40 C200,60 400,15 600,40 C800,60 1000,15 1200,40 L1200,60 L0,60 Z"
                      fill="var(--light-bg)" opacity="0.6" />
            </svg>
        </div>

        <!-- ===== 研究室紹介 & トピックス ===== -->
        <section class="page-section">
            <div class="container content-grid">
                <div class="main-content">
                    <article class="content-block fade-in-up">
                        <h3 class="content-title">研究室紹介</h3>
                        <!-- 
                        【紹介動画のYouTube変更箇所】
                        YouTubeで「共有」→「埋め込み」を選択し、表示される <iframe> タグの
                        src属性のURL（https://www.youtube.com/embed/XXXXXX）を貼り付けてください。
                        -->
                        <div class="video-container">
                            <iframe width="515" height="270"
                                src="https://www.youtube.com/embed/VWLxVF2bb70?si=TaH3Cah87-5Ypgb8"
                                title="YouTube video player" frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                        </div>
                    </article>
                </div>
                <!-- 
                【最新トピックスサイドバー】
                表示されるトピックスは「news-data.js」からJavaScript（script.js）を介して
                自動で最新の5件が読み込まれます。この場所のリスト（ul）自体を直接編集する必要はありません。
                -->
                <aside class="sidebar">
                    <div class="content-block">
                        <h3 class="content-title">最新トピックス</h3>
                        <ul class="news-summary-list" id="index-news-list">
                            <!-- JavaScriptによって動的に生成されます -->
                        </ul>
                        <div class="text-right">
                            <a href="news.html" class="link-arrow">トピックス一覧</a>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2025 藤原研究室, 南山大学. All Rights Reserved.</p>
    </footer>

    <!-- 
    【データおよびスクリプトの読み込み】
    - news-data.js: トピックス（ニュース）データの一元管理ファイル
    - script.js: 波動Canvas、スライドショー、ヘッダースクロール変化等のスクリプト
    -->
    <script src="news-data.js"></script>
    <script src="script.js"></script>
</body>

</html>
