<!-- 
===================================================================
藤原研究室 ホームページ - ギャラリー（gallery.html）
===================================================================
このファイルは「ギャラリー（写真館）」ページのレイアウトと内容を定義しています。

【編集可能な主な箇所】
- スライドショーに表示する画像の追加・変更（50行目〜）

【画像の追加方法】
<div id="gallery-container" class="gallery-container"> の中に、
以下のブロックを追加してください。
  <div class="gallery-item">
      <img src="画像のパス" alt="説明文（任意）">
  </div>
※ 追加した画像のアスペクト比に合わせて、幅がJavaScriptによって自動調整されます。
===================================================================
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギャラリー | 南山大学藤原研究室</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 
    【共通ヘッダー】
    メニュー項目を増やしたり変更したりする場合は、このブロックおよび下方の
    モバイルメニュー（mobile-menu）、そして他ページ（index.html等）のヘッダーも同様に修正してください。
    -->
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">南山大学 藤原研究室</a>
            <nav class="main-nav">
                <a href="index.html">ホーム</a>
                <a href="news.html">トピックス</a>
                <!-- <a href="research.html">研究内容</a> -->
                <a href="members.html">メンバー</a>
                <a href="achievements.html">研究業績</a>
                <a href="gallery.html">ギャラリー</a>
                <a href="equipments.html">研究設備</a>
                <a href="contact.html">アクセス</a>
                <a href="links.html">リンク</a>
            </nav>
            <button id="mobile-menu-button" class="mobile-menu-button" aria-label="メニュー">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="index.html">ホーム</a>
            <a href="news.html">トピックス</a>
            <!--<a href="research.html">研究内容</a> -->
            <a href="members.html">メンバー</a>
            <a href="achievements.html">研究業績</a>
            <a href="gallery.html">ギャラリー</a>
            <a href="equipments.html">研究設備</a>
            <a href="contact.html">アクセス</a>
            <a href="links.html">リンク</a>
        </div>
    </header>

    <main style="padding-top: var(--header-height);">
        <section id="gallery" class="page-section">
            <div class="container">
                <h2 class="section-title"><span class="section-title-en">Gallery</span><span class="section-title-ja">ギャラリー</span></h2>
                <div class="gallery-wrapper">
                    <!-- 
                    【ギャラリー画像変更箇所】
                    表示したい画像のパス（img/〜）をsrc属性に指定してください。
                    画像を増やす、または減らす場合は 以下の <div class="gallery-item"> ブロックを追加・削除してください。
                    -->
                    <div id="gallery-container" class="gallery-container">
                        <div class="gallery-item">
                            <img src="img/gallery/20251219.jpg" alt="">
                        </div>
                        <div class="gallery-item">
                            <img src="img/gallery/M1members.jpg" alt="">
                        </div>
                        <div class="gallery-item">
                            <img src="img/gallery/thermoMano.jpg" alt="">
                        </div>
                        <!--
                        <div class="gallery-item">
                            <img src="https://placehold.co/600x400/f472b6/ffffff?\" alt="">
                        </div>
                        -->
                    </div>
                    <button id="prev-btn" class="gallery-btn prev">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <button id="next-btn" class="gallery-btn next">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
                
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 藤原研究室, 南山大学. All Rights Reserved.</p>
    </footer>

    <!-- 
    【スクリプトの読み込み】
    - script.js: 無限ループスライドショーの制御、ヘッダースクロール変化等の共通スクリプト
    -->
    <script src="script.js"></script>
</body>
</html>
