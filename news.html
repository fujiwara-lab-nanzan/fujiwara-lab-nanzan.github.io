<!-- 
===================================================================
藤原研究室 ホームページ - トピックス一覧（news.html）
===================================================================
このファイルは「トピックス（ニュース）」ページの一覧表示レイアウトを定義しています。

【注意点】
- トピックス（お知らせ）の実データは「news-data.js」で一元管理されています。このファイルを直接編集する必要はありません。
- ニュースの追加・修正・削除は「news-data.js」を編集してください。自動的にこのページに反映されます。
===================================================================
-->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トピックス | 南山大学藤原研究室</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- 
    【共通ヘッダー】
    メニュー項目を増やしたり変更したりする場合は、このブロックおよび下方の
    モバイルメニュー（mobile-menu）、そして他ページ（index.html等）のヘッダーも同様に修正してください。
    -->
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">南山大学 藤原研究室</a>
            <nav class="main-nav">
                <a href="index.html">ホーム</a>
                <a href="news.html">トピックス</a>
                <!-- <a href="research.html">研究内容</a> -->
                <a href="members.html">メンバー</a>
                <a href="achievements.html">研究業績</a>
                <a href="gallery.html">ギャラリー</a>
                <a href="equipments.html">研究設備</a>
                <a href="contact.html">アクセス</a>
                <a href="links.html">リンク</a>
            </nav>
            <button id="mobile-menu-button" class="mobile-menu-button" aria-label="メニュー">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="index.html">ホーム</a>
            <a href="news.html">トピックス</a>
            <!-- <a href="research.html">研究内容</a> -->
            <a href="members.html">メンバー</a>
            <a href="achievements.html">研究業績</a>
            <a href="gallery.html">ギャラリー</a>
            <a href="equipments.html">研究設備</a>
            <a href="contact.html">アクセス</a>
            <a href="links.html">リンク</a>
        </div>
    </header>

    <main style="padding-top: var(--header-height);">
        <section id="news" class="page-section">
            <div class="container">
                <h2 class="section-title"><span class="section-title-en">Topics</span><span class="section-title-ja">トピックス</span></h2>
                <!-- 
                【トピックスリストコンテナ】
                ここに表示されるニュース項目は「news-data.js」からJavaScript（script.js）を介して
                自動で読み込まれ、年別にグループ化されて表示されます。この場所を直接編集する必要はありません。
                -->
                <div class="news-list" id="news-page-list">
                    <!-- JavaScriptによって動的に生成されます -->
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 藤原研究室, 南山大学. All Rights Reserved.</p>
    </footer>

    <!-- 
    【画像拡大用オーバーレイ】
    ニュース内の写真をクリックしたときに、画面全体に拡大表示するためのコンテナです。
    表示と非表示の制御は script.js、デザインは style.css で定義されています。
    -->
    <div id="image-overlay" class="image-overlay" aria-hidden="true">
        <img id="overlay-img" src="" alt="拡大画像">
    </div>

    <!-- 
    【データおよびスクリプトの読み込み】
    - news-data.js: トピックス（ニュース）データの一元管理ファイル
    - script.js: 動的トピックス生成、ヘッダースクロール変化等のスクリプト
    -->
    <script src="news-data.js"></script>
    <script src="script.js"></script>
</body>

</html>
